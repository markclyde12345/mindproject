name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install MAUI Android Workload
      run: dotnet workload install maui-android

    - name: Restore (Android only)
      run: dotnet restore MauiApp4/project.csproj -p:TargetFrameworks=net10.0-android

    - name: Build APK
      run: dotnet publish MauiApp4/project.csproj -f net10.0-android -c Release -o ./output

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: ./output/*.apk
